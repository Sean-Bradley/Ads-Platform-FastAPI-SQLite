services:
  db:
    image: postgres:18
    container_name: ads-postgres
    restart: always

    environment:
      POSTGRES_DB: ads_platform
      POSTGRES_USER: ads_user
      POSTGRES_PASSWORD: ads_password

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql

  web:
    build: .
    container_name: ads-platform

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - '8000:8000'

volumes:
  postgres_data: